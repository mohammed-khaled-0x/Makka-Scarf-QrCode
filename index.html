<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makka Scarf - لمسة إبداع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'brand-maroon': '#8c1c23',
              'brand-gold': '#ca9d51',
            }
          }
        }
      }
    </script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        /* --- خلفية متحركة وأشكال (زي ما إنت كنت عاملها) --- */
        .animated-background {
            filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background: linear-gradient(135deg, #ca9d5130, #ffffff, #8c1c2320, #ffffff);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: float 2s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .shape1 { background-color: #ca9d51; width: 150px; height: 150px; top: 10%; left: 5%; animation-duration: 18s; }
        .shape2 { background-color: #8c1c23; width: 200px; height: 200px; top: 70%; left: 80%; animation-duration: 22s; animation-delay: 2s; }
        .shape3 { background-color: #ca9d51; width: 80px; height: 80px; top: 40%; left: 70%; animation-duration: 16s; animation-delay: 1s; }
        .shape4 { background-color: #8c1c23; width: 120px; height: 120px; top: 85%; left: 15%; animation-duration: 20s; animation-delay: 3s; }

        @keyframes float {
            from { transform: translateY(0px) rotate(0deg); }
            to   { transform: translateY(-30px) translateX(20px) rotate(45deg); }
        }

        /* --- سر الفخامة والـ 3D اللي في الصورة --- */
        .scene {
            perspective: 1000px; /* ده اللي بيدي عمق للشاشة */
        }

        .card-3d {
            transform-style: preserve-3d; /* بيخلي العناصر اللي جوه الكارت تخرج لبرة */
            transition: transform 0.15s ease-out;
            will-change: transform;
            position: relative;
        }

        /* الطبقة اللي هتبرز لبرة (اللوجو والزراير) */
        .pop-out {
            transform: translateZ(40px);
        }

        .pop-out-logo {
            transform: translateZ(60px); /* اللوجو بارز أكتر حاجة */
        }

        /* ضل عميق ورا الكارت عشان يدي إحساس إنه طاير */
        .card-shadow {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.15);
            transform: translateZ(-30px);
            filter: blur(20px);
            border-radius: 0.75rem;
            z-index: -1;
        }

        /* --- تحسينات الأزرار بالألوان الجديدة --- */
         .link-button {
            transition: all 0.3s ease-in-out;
            border: none;
        }

        /* الوان الزراير بالتدرج اللي طلبته للموبايل */
        .fb-button { background: linear-gradient(135deg, #1877F2 0%, #0c59bb 100%); color: white; }
        .ig-button { background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; }
        .tg-button { background: linear-gradient(135deg, #2AABEE 0%, #1a8cc5 100%); color: white; }

        .link-button:active {
            transform: translateY(2px) scale(0.98);
        }

        .link-button img {
            filter: brightness(0) invert(1); /* تبييض الأيقونات عشان تليق على الخلفية الملونة */
        }

        /* --- شاشة البداية عشان ناخد تصريح الحركة --- */
        #permission-modal {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body class="relative min-h-screen flex flex-col items-center justify-center p-6 text-gray-800">

    

    <div class="animated-background">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        <div class="shape shape4"></div>
    </div>

    <div class="scene z-10 w-full max-w-md mx-auto">
        <div id="the-card" class="card-3d bg-white/80 backdrop-blur-sm p-8 rounded-xl border border-white/50 text-center">
            
            <div class="card-shadow"></div>

            <div class="pop-out-logo mb-8">
                <img src="assets/logo_makka_scarf.png" alt="Makka Scarf Logo" class="w-40 sm:w-48 mx-auto drop-shadow-md">
            </div>

            <div class="space-y-5 pop-out">
                <a href="https://www.facebook.com/profile.php?id=100064110032114" target="_blank" rel="noopener noreferrer"
                   class="link-button fb-button flex items-center justify-center w-full rounded-lg shadow-md p-4 font-bold text-lg">
                    <img src="assets/facebook-icon.png" alt="Facebook" class="w-6 h-6 ml-3">
                    <span>فيسبوك</span>
                </a>
                
                <a href="https://www.instagram.com/makka_scarf_" target="_blank" rel="noopener noreferrer"
                   class="link-button ig-button flex items-center justify-center w-full rounded-lg shadow-md p-4 font-bold text-lg">
                     <img src="assets/instagram-icon.png" alt="Instagram" class="w-6 h-6 ml-3">
                    <span>انستجرام</span>
                </a>

                <a href="https://t.me/s/makkascarves" target="_blank" rel="noopener noreferrer"
                   class="link-button tg-button flex items-center justify-center w-full rounded-lg shadow-md p-4 font-bold text-lg">
                    <img src="assets/telegram-icon.png" alt="Telegram" class="w-6 h-6 ml-3">
                    <span>تليجرام</span>
                </a>
            </div>

            <footer class="pop-out mt-10 text-sm font-bold text-gray-500">
                © <span id="year"></span> Makka Scarf
            </footer>
        </div>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        const card = document.getElementById('the-card');
        const modal = document.getElementById('permission-modal');
        

        // حساب حركة الموبايل عشان تلف الكارت
        function handleOrientation(event) {
            let x = event.beta;  // الميل لقدام وورا
            let y = event.gamma; // الميل يمين وشمال

            if (x === null || y === null) return;

            // تظبيط زاوية ماسكة الموبايل الطبيعية
            x = x - 45;

            // تحديد أقصى زاوية ميل عشان الكارت ميتقلبش
            x = Math.max(-25, Math.min(25, x));
            y = Math.max(-25, Math.min(25, y));

            // تطبيق الدوران على الكارت 
            card.style.transform = `rotateX(${-x}deg) rotateY(${y}deg)`;
        }

        // لما يدوس على زرار البداية
        
            // طلب تصريح من الموبايل
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        } else {
                            alert("يا ناصح لازم توافق عشان الحركة تشتغل!");
                        }
                    })
                    .catch(console.error);
            } else {
                // للأجهزة القديمة شوية اللي مبتطلبش تصريح
                window.addEventListener('deviceorientation', handleOrientation);
            }

            // إخفاء شاشة البداية بنعومة
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.style.display = 'none';
            }, 500);

        // تشغيل الحركة بالماوس لو فتحته من الكمبيوتر
        document.addEventListener('mousemove', (e) => {
            if (modal.style.display !== 'none') return;
            let xAxis = (window.innerWidth / 2 - e.pageX) / 20;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 20;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body>
</html>
