<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makka Scarf - لمسة إبداع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'brand-maroon': '#8c1c23',
              'brand-gold': '#ca9d51',
            },
            fontFamily: {
              sans: ['Cairo', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
        body {
            background-color: #fdfbf7;
            overflow-x: hidden;
            position: relative;
            /* خلفية ناعمة جدا تليق بالموبايل من غير دوشة ولا نقط */
            background-image: radial-gradient(circle at top right, rgba(202, 157, 81, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(140, 28, 35, 0.1), transparent 40%);
        }

        /* المربع الزجاجي */
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 25px 50px -12px rgba(140, 28, 35, 0.12);
            /* التحضير لحركة الموبايل */
            transition: transform 0.15s ease-out;
            transform-style: preserve-3d;
        }

        /* حركة الدخول */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        /* الزراير */
        .link-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100%;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        /* خليت التأثير يشتغل مع الهوفر للكمبيوتر ومع اللمس للموبايل */
        .link-btn:hover::before, .link-btn:active::before {
            right: 0;
        }

        .link-btn:hover, .link-btn:active {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.15);
        }

        .link-btn * {
            position: relative;
            z-index: 1;
            transition: all 0.4s ease;
        }

        /* ألوان التعبئة للزراير بالألوان الأصلية لكل منصة */
        .btn-fb::before { background-color: #1877F2; } 
        .btn-ig::before { background-image: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-tg::before { background-color: #2AABEE; }

        .link-btn:hover span, .link-btn:active span,
        .link-btn:hover svg, .link-btn:active svg {
            color: #ffffff !important;
        }
        
        /* تبييض الأيقونات لما تقف عليها */
        .link-btn:hover img, .link-btn:active img {
            filter: brightness(0) invert(1);
            transform: scale(1.1); 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8 antialiased">

    <main id="tilt-card" class="glass-card w-full max-w-md rounded-[2.5rem] pt-20 pb-10 px-6 sm:px-10 relative mt-16 animate-fade-in">
        
        <div class="absolute -top-16 left-1/2 logo-container" style="transform: translateZ(30px) translateX(-50%);">
            <div class="w-32 h-32 bg-white rounded-full shadow-2xl flex items-center justify-center p-3 border-4 border-white">
                <img src="assets/logo_makka_scarf.png" alt="Makka Scarf" class="w-full h-auto object-contain">
            </div>
        </div>

        <div class="text-center mt-2 mb-10" style="transform: translateZ(20px);">
            <h1 class="text-3xl font-extrabold text-brand-maroon mb-2">Makka Scarf</h1>
            <p class="text-gray-500 font-bold text-sm">لمسة إبداع في عالم الأناقة</p>
        </div>

        <div class="space-y-5" style="transform: translateZ(15px);">
            
            <a href="https://www.facebook.com/profile.php?id=100064110032114" target="_blank" rel="noopener noreferrer"
               class="link-btn btn-fb flex items-center justify-between bg-white/80 border border-gray-100 rounded-2xl p-4 group" style="animation-delay: 0.1s;">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center group-hover:bg-white/20 transition-colors">
                        <img src="assets/facebook-icon.png" alt="Facebook" class="w-7 h-7">
                    </div>
                    <span class="font-bold text-lg text-gray-800">فيسبوك</span>
                </div>
                <svg class="w-6 h-6 text-gray-400 group-hover:text-white transition-colors rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="https://www.instagram.com/makka_scarf_" target="_blank" rel="noopener noreferrer"
               class="link-btn btn-ig flex items-center justify-between bg-white/80 border border-gray-100 rounded-2xl p-4 group" style="animation-delay: 0.2s;">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-pink-50 flex items-center justify-center group-hover:bg-white/20 transition-colors">
                        <img src="assets/instagram-icon.png" alt="Instagram" class="w-7 h-7">
                    </div>
                    <span class="font-bold text-lg text-gray-800">انستجرام</span>
                </div>
                <svg class="w-6 h-6 text-gray-400 group-hover:text-white transition-colors rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="https://t.me/s/makkascarves" target="_blank" rel="noopener noreferrer"
               class="link-btn btn-tg flex items-center justify-between bg-white/80 border border-gray-100 rounded-2xl p-4 group" style="animation-delay: 0.3s;">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-sky-50 flex items-center justify-center group-hover:bg-white/20 transition-colors">
                        <img src="assets/telegram-icon.png" alt="Telegram" class="w-7 h-7">
                    </div>
                    <span class="font-bold text-lg text-gray-800">تليجرام</span>
                </div>
                <svg class="w-6 h-6 text-gray-400 group-hover:text-white transition-colors rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
            </a>

        </div>

        <footer class="mt-12 text-center text-sm font-bold text-gray-400" style="animation-delay: 0.4s; transform: translateZ(10px);">
            © <span id="year"></span> Makka Scarf
        </footer>
    </main>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        
        // تشغيل الظهور بالترتيب
        document.querySelectorAll('.link-btn, footer').forEach((el, index) => {
            el.classList.add('animate-fade-in');
            el.style.animationDelay = `${(index + 2) * 0.15}s`;
            el.style.opacity = '0';
        });

        // حركة الكارت مع ميل الموبايل 
        const card = document.getElementById('tilt-card');
        
        window.addEventListener('deviceorientation', (e) => {
            if (e.beta && e.gamma) {
                let x = (e.beta - 45) / 4; 
                let y = e.gamma / 4;       
                
                x = Math.max(-15, Math.min(15, x));
                y = Math.max(-15, Math.min(15, y));

                card.style.transform = `perspective(1000px) rotateX(${-x}deg) rotateY(${y}deg)`;
            }
        });

        // حركة الكارت مع الماوس عشان لو فتحته من الكمبيوتر
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `perspective(1000px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // ترجيع الكارت مكانه
        document.addEventListener('mouseleave', () => {
            card.style.transform = `perspective(1000px) rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body>
</html>
